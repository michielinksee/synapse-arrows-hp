<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Synapse Arrows</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

    <nav class="nav">
        <div class="container nav-inner">
            <a href="/" class="nav-logo">
                <img src="/logo.png" alt="Synapse Arrows" width="32" height="32">
                Synapse Arrows
            </a>
            <ul class="nav-links">
                <li><a href="/about/">About</a></li>
                <li><a href="/products/">Products</a></li>
                <li><a href="/services/">Services</a></li>
                <li><a href="/insights/">Insights</a></li>
                <li><a href="/contact/" class="nav-cta">Contact</a></li>
            </ul>
            <div class="lang-switch">
                <a href="#" class="active">JP</a>
                <span>|</span>
                <a href="/en/">EN</a>
            </div>
            <button class="mobile-menu-btn" aria-label="Menu"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <section class="section" style="min-height:60vh; display:flex; align-items:center;">
        <div class="container" style="text-align:center;">
            <h1 style="font-size:clamp(3rem,8vw,6rem); font-weight:800; color:var(--primary); margin-bottom:16px;">404</h1>
            <p style="font-size:1.2rem; color:var(--text-secondary); margin-bottom:32px;">
                お探しのページが見つかりませんでした。<br>
                The page you're looking for doesn't exist.
            </p>
            <div style="display:flex; gap:16px; justify-content:center; flex-wrap:wrap;">
                <a href="/" class="btn-primary">
                    ホームへ戻る
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3L11 8L6 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </a>
                <a href="/products/" class="btn-secondary">Products</a>
                <a href="/contact/" class="btn-secondary">Contact</a>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container footer-inner">
            <div class="footer-logo">Synapse Arrows Pte. Ltd</div>
            <div class="footer-copy">&copy; 2026 Synapse Arrows Pte. Ltd. All rights reserved.</div>
        </div>
    </footer>

    <script>
    document.querySelector('.mobile-menu-btn').addEventListener('click', function() {
        const nav = document.querySelector('.nav-links');
        const lang = document.querySelector('.lang-switch');
        const isOpen = nav.style.display === 'flex';
        nav.style.display = isOpen ? 'none' : 'flex';
        nav.style.flexDirection = 'column';
        nav.style.position = 'absolute';
        nav.style.top = '72px';
        nav.style.left = '0';
        nav.style.right = '0';
        nav.style.background = '#fff';
        nav.style.padding = '20px';
        nav.style.boxShadow = '0 8px 24px rgba(0,0,0,0.1)';
        if (lang) lang.style.display = isOpen ? 'none' : 'flex';
    });
    </script>

</body>
</html>
